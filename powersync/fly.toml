app = "nasti-powersync"
primary_region = "syd"

[build]
  image = "journeyapps/powersync-service:latest"

[deploy]
  strategy = "rolling"

[processes]
  app = "start -r unified"

[env]
  POWERSYNC_CONFIG_PATH = "/config/service.yaml"
  NODE_OPTIONS = "--max-old-space-size=800"

[[files]]
  guest_path = "/config/service.yaml"
  secret_name = "POWERSYNC_CONFIG_B64"

[[files]]
  guest_path = "/config/sync-config.yaml"
  secret_name = "POWERSYNC_SYNC_CONFIG_B64"

[http_service]
  internal_port = 8080
  force_https = true
  processes = ["app"]
  auto_stop_machines = "off"
  auto_start_machines = true

[http_service.concurrency]
  type = "requests"
  soft_limit = 100
  hard_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/probes/liveness"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  processes = ["app"]
